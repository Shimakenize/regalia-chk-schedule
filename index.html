<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGALIA 試合予定照合</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    :root {
      --bg:       #0a0f23;
      --surface:  #12183a;
      --border:   #1e2d5a;
      --blue:     #7eaaff;
      --blue-lt:  #c8dcff;
      --green:    #64d278;
      --warn:     #ffcc80;
      --danger:   #ff5252;
      --text:     #e8eaf6;
      --muted:    #8899aa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }
    /* ── Header ─────────────────────────────────── */
    .header {
      background: #0d2a5e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { color: var(--blue-lt); font-size: 15px; font-weight: bold; }
    .header-version { color: var(--muted); font-size: 11px; }
    /* ── Tabs ────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 10px 4px;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    /* ── Summary Cards ───────────────────────────── */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .card-num  { font-size: 28px; font-weight: bold; }
    .card-label{ color: var(--muted); font-size: 11px; margin-top: 2px; }
    .card.ok   .card-num { color: var(--green); }
    .card.warn .card-num { color: var(--danger); }
    /* ── Section Header ──────────────────────────── */
    .section-head {
      padding: 8px 12px;
      color: var(--blue);
      font-size: 12px;
      font-weight: bold;
      border-bottom: 1px solid var(--border);
    }
    /* ── Disc / Sched items ──────────────────────── */
    .disc-list, .sched-list { padding: 0 12px 80px; }
    .disc-item, .sched-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 8px 0;
      padding: 10px;
    }
    .disc-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .disc-date  { color: var(--blue-lt); font-weight: bold; font-size: 13px; }
    .disc-cat   { color: var(--muted); font-size: 11px; }
    .disc-row   { display: flex; gap: 4px; margin: 3px 0; align-items: flex-start; }
    .disc-label { min-width: 34px; font-size: 11px; color: var(--muted); padding-top: 1px; }
    .disc-val   { font-size: 12px; flex: 1; }
    .disc-off   { color: #a0c4ff; }
    .disc-coa   { color: var(--warn); }
    .disc-type  { color: var(--danger); font-size: 11px; font-weight: bold; margin-top: 4px; }
    /* ── Badges ──────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
    }
    .badge.open     { background: #ff525233; color: var(--danger); }
    .badge.resolved { background: #64d27833; color: var(--green); }
    .badge.ng       { background: #ff8a0033; color: #ffaa44; }
    .badge.ok       { background: #64d27818; color: var(--green); }
    /* ── Judge Buttons ───────────────────────────── */
    .disc-actions { display: flex; gap: 8px; margin-top: 8px; }
    .judge-btn {
      flex: 1; padding: 8px; border-radius: 6px;
      font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid;
    }
    .judge-btn.ok     { background: #64d27820; color: var(--green);  border-color: var(--green); }
    .judge-btn.danger { background: #ff525220; color: var(--danger); border-color: var(--danger); }
    .judge-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    /* ── Admin Panel ─────────────────────────────── */
    .admin-panel {
      padding: 16px 12px 80px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .admin-btn {
      background: #1565C0;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .admin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .admin-btn.secondary { background: var(--surface); color: var(--blue); border: 1px solid var(--border); }
    /* ── Status bar ──────────────────────────────── */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    /* ── Loading / Empty ─────────────────────────── */
    .loading, .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
    }
    .spinner {
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      width: 36px; height: 36px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── Filter bar ──────────────────────────────── */
    .filter-bar {
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }
    .filter-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    /* ── page ────────────────────────────────────── */
    .page { display: none; }
    .page.active { display: block; }
    /* ── Schedule(照合) 2列レイアウト ───────────── */
    .sched-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .sched-date-cat { color: var(--blue-lt); font-weight: bold; font-size: 13px; }
    .match-2col {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 8px;
      margin-bottom: 6px;
    }
    .col-sep { background: var(--border); }
    .col-hdr {
      font-size: 10px;
      font-weight: bold;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }
    .col-line .col-hdr { color: var(--warn); }
    .col-off  .col-hdr { color: #a0c4ff; }
    .col-time     { font-size: 13px; font-weight: bold; }
    .col-opponent { font-size: 12px; margin-top: 2px; }
    .col-venue    { font-size: 11px; color: var(--muted); margin-top: 1px; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">⚽ 試合予定 照合</span>
  <span class="header-version" id="version-label">v0.1.0</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="summary" onclick="switchTab('summary')">サマリー</div>
  <div class="tab"        data-tab="disc"    onclick="switchTab('disc')">差分</div>
  <div class="tab"        data-tab="sched"   onclick="switchTab('sched')">スケジュール(照合)</div>
  <div class="tab"        data-tab="admin"   onclick="switchTab('admin')" id="admin-tab" style="display:none">管理</div>
</div>

<!-- ── サマリー ────────────────────────────────── -->
<div id="page-summary" class="page active">
  <div class="summary">
    <div class="card ok">
      <div class="card-num" id="cnt-ok">—</div>
      <div class="card-label">照合OK</div>
    </div>
    <div class="card warn">
      <div class="card-num" id="cnt-warn">—</div>
      <div class="card-label">未確認+要調査</div>
    </div>
  </div>
  <div class="section-head">最終照合</div>
  <div id="last-checked" style="padding:10px 12px; color:var(--muted); font-size:12px;">読み込み中…</div>
  <div class="section-head">カテゴリ別</div>
  <div id="category-breakdown" style="padding:8px 12px 80px;"></div>
</div>

<!-- ── 差分リスト ──────────────────────────────── -->
<div id="page-disc" class="page">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterDisc('open',this)">未確認</button>
    <button class="filter-btn"        onclick="filterDisc('resolved',this)">確認済</button>
    <button class="filter-btn"        onclick="filterDisc('ng',this)">要調査</button>
    <button class="filter-btn"        onclick="filterDisc('all',this)">全て</button>
  </div>
  <div class="disc-list" id="disc-list"><div class="loading"><div class="spinner"></div>読み込み中…</div></div>
</div>

<!-- ── スケジュール(照合) ──────────────────────── -->
<div id="page-sched" class="page">
  <div class="filter-bar" id="cat-filter"></div>
  <div class="sched-list" id="sched-list"><div class="loading"><div class="spinner"></div>読み込み中…</div></div>
</div>

<!-- ── 管理 ───────────────────────────────────── -->
<div id="page-admin" class="page">
  <div class="admin-panel">
    <button class="admin-btn" id="btn-compare" onclick="adminAction('compare')">🔄 今すぐ照合</button>
    <button class="admin-btn" id="btn-send"    onclick="adminAction('send')">📤 今すぐ配信</button>
    <div id="admin-result" style="color:var(--muted); font-size:12px; padding:8px 0;"></div>
    <button class="admin-btn secondary" onclick="adminAction('init')">⚙️ シート初期化（初回のみ）</button>
  </div>
</div>

<div class="status-bar">
  <span id="status-msg">初期化中…</span>
  <span id="status-user"></span>
</div>

<script>
// ── 設定 ────────────────────────────────────────────────────────────────────
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbxQSNvMNuCKlXM9V8FQLMQwAeb7U_Z2Xn-xBVRfvnv302cu_ckO-g-wyPATYuv4dPZY/exec';
const LIFF_ID  = '2010471175-mz6PBjZx';

// ── 状態 ────────────────────────────────────────────────────────────────────
const __UI_BUILD__ = 6;
let userId       = null;
let isAdmin      = false;
let isAllowed    = false;
let discData     = [];
let schedData    = [];   // official_schedule
let coachData    = [];   // coach_schedule (match only)
let discFilter   = 'open';
let catFilter    = '全て';

// ── ユーティリティ ────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

function safeParse(json) {
  try { return JSON.parse(json); } catch { return null; }
}

function normDate(v) {
  return String(v || '').substring(0, 10);
}

function catBase(cat) {
  return String(cat || '').replace(/_FUTSAL$/, '');
}

function catSortKey(cat) {
  const c = String(cat || '');
  if (c === 'all')  return 0;
  if (c.startsWith('U-15')) return 1;
  if (c.startsWith('U-14')) return 2;
  if (c.startsWith('U-13')) return 3;
  return 4;
}

function fmtDate(ds) {
  if (!ds || ds.length < 10) return ds || '—';
  const [y, mo, dd] = ds.split('-').map(Number);
  const dow = ['日','月','火','水','木','金','土'][new Date(y, mo - 1, dd).getDay()];
  return `${mo}/${dd}(${dow})`;
}

function statusBadge(status) {
  if (status === 'open')     return '<span class="badge open">未確認</span>';
  if (status === 'resolved') return '<span class="badge resolved">確認済</span>';
  if (status === 'ng')       return '<span class="badge ng">要調査</span>';
  return '<span class="badge ok">照合OK</span>';
}

// ── 初期化 ──────────────────────────────────────────────────────────────────
async function init() {
  setStatus('LINE 認証中…');
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    userId = profile.userId;
    document.getElementById('status-user').textContent = profile.displayName;

    const meRes = await gasGet('auth/me', { userId });
    isAdmin   = meRes.isAdmin   || false;
    isAllowed = meRes.isAllowed || false;
    if (isAdmin) document.getElementById('admin-tab').style.display = '';

    const cfgRes = await gasGet('config');
    if (cfgRes.version) document.getElementById('version-label').textContent = 'v' + cfgRes.version;

    await Promise.all([loadDiscrepancies(), loadSchedules(), loadCoachSchedules()]);
    renderSummary();
    renderCatFilter();
    renderSchedList();
    setStatus('読み込み完了');
  } catch (e) {
    setStatus('エラー: ' + e.message);
  }
}

// ── API 呼出し ───────────────────────────────────────────────────────────────
async function gasGet(path, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('_path', path);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url.toString());
  return r.json();
}

async function gasPost(path, body) {
  const url = new URL(GAS_URL);
  url.searchParams.set('_path', path);
  const r = await fetch(url.toString(), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── データ読込 ───────────────────────────────────────────────────────────────
async function loadDiscrepancies() {
  const res = await gasGet('api/discrepancies');
  discData = res.discrepancies || [];
  renderDiscList();
}

async function loadSchedules() {
  const res = await gasGet('api/schedules');
  schedData = (res.schedules || []).sort((a, b) =>
    normDate(a.match_date).localeCompare(normDate(b.match_date))
  );
}

async function loadCoachSchedules() {
  const res = await gasGet('api/coach-schedules');
  coachData = res.schedules || [];
}

// ── サマリー描画 ────────────────────────────────────────────────────────────
function renderSummary() {
  const open = discData.filter(d => d.status === 'open');
  const ng   = discData.filter(d => d.status === 'ng');
  const total = schedData.length;
  const bad   = [...open, ...ng].filter(d => d.type !== 'coach_only');
  document.getElementById('cnt-ok').textContent   = Math.max(0, total - bad.length);
  document.getElementById('cnt-warn').textContent = open.length + ng.length;

  const dates = discData.map(d => d.detected_at).filter(Boolean).sort();
  const lastDate = dates.length ? dates[dates.length - 1] : '—';
  document.getElementById('last-checked').textContent = '最終照合: ' + lastDate;

  const cats = {};
  for (const d of [...open, ...ng]) {
    const c = d.category_code || '不明';
    cats[c] = (cats[c] || 0) + 1;
  }
  const bd = document.getElementById('category-breakdown');
  if (Object.keys(cats).length === 0) {
    bd.innerHTML = '<div style="color:var(--green);padding:10px;">✅ 全カテゴリ一致</div>';
  } else {
    bd.innerHTML = Object.entries(cats).map(([c, n]) =>
      `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);">
        <span>${c}</span><span style="color:var(--danger)">${n}件</span>
      </div>`
    ).join('');
  }
}

// ── 差分リスト描画 ───────────────────────────────────────────────────────────
const TYPE_LABELS = {
  official_only:     '【公式未掲載】',
  coach_only:        '【公式にない】',
  time_mismatch:     '【時刻差異】',
  venue_mismatch:    '【会場差異】',
  opponent_mismatch: '【相手名差異】',
};

function renderDiscList() {
  const container = document.getElementById('disc-list');
  let items = discData;
  if (discFilter !== 'all') items = items.filter(d => d.status === discFilter);

  if (items.length === 0) {
    container.innerHTML = '<div class="empty">✅ 該当なし</div>';
    return;
  }

  container.innerHTML = items.map(d => {
    const off = safeParse(d.official_data) || {};
    const coa = safeParse(d.coach_data)    || {};
    const badge = statusBadge(d.status);
    const actions = (d.status === 'open' && isAllowed)
      ? judgeButtons(d.id)
      : '';

    return `<div class="disc-item">
      <div class="disc-header">
        <span class="disc-date">📅 ${d.match_date || '—'}</span>
        <span class="disc-cat">${d.category_code || ''} ${badge}</span>
      </div>
      ${off.time || off.opponent ? `<div class="disc-row">
        <span class="disc-label disc-off">公式</span>
        <span class="disc-val disc-off">${off.time || ''} ${off.opponent || '—'} ${off.venue ? '@ '+off.venue : ''}</span>
      </div>` : ''}
      ${coa.time || coa.title ? `<div class="disc-row">
        <span class="disc-label disc-coa">LINE</span>
        <span class="disc-val disc-coa">${coa.time || ''} ${coa.title || '—'} ${coa.venue ? '@ '+coa.venue : ''}</span>
      </div>` : ''}
      <div class="disc-type">→ ${TYPE_LABELS[d.type] || d.type}</div>
      ${actions}
    </div>`;
  }).join('');
}

function filterDisc(filter, btn) {
  discFilter = filter;
  document.querySelectorAll('#page-disc .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDiscList();
}

// ── スケジュール(照合) 描画 ───────────────────────────────────────────────────
// 対戦相手名の類似度（0〜1）
function _nameSim(a, b) {
  if (!a || !b) return 0;
  const norm = s => String(s)
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[　\s・]/g, '').toLowerCase();
  const na = norm(a), nb = norm(b);
  if (!na || !nb) return 0;
  if (na === nb) return 1;
  if (na.includes(nb) || nb.includes(na)) return 0.8;
  let common = 0;
  for (const ch of na) if (nb.includes(ch)) common++;
  return common / Math.max(na.length, nb.length);
}

function buildMerged() {
  const today = new Date().toISOString().split('T')[0];

  // disc を (normDate_catBase) でグループ化
  const discByKey = {};
  discData.forEach(d => {
    const key = normDate(d.match_date) + '_' + catBase(d.category_code);
    (discByKey[key] = discByKey[key] || []).push(d);
  });

  // official を (normDate_category) でプール化（各エントリに _used フラグ）
  // フットサルはカテゴリ変換: U-15_FUTSAL → U-15、U-14_FUTSAL → U-14 でも検索できるよう両キーで登録
  const offPool = {};
  schedData.forEach(o => {
    const key = normDate(o.match_date) + '_' + o.category_code;
    (offPool[key] = offPool[key] || []).push({ ...o, _used: false });
    // フットサルカテゴリを基本カテゴリにもマップ
    const base = o.category_code.replace('_FUTSAL', '');
    if (base !== o.category_code) {
      const altKey = normDate(o.match_date) + '_' + base;
      (offPool[altKey] = offPool[altKey] || []).push(o); // 同オブジェクトを参照: _used 共有
    }
  });

  // 日付+カテゴリから最も名前が近い未使用公式エントリを消費する
  function consumeOff(dateStr, cat, coachTitle) {
    const keys = [dateStr + '_' + cat, dateStr + '_' + catBase(cat)];
    for (const key of [...new Set(keys)]) {
      const pool = (offPool[key] || []).filter(o => !o._used);
      if (pool.length === 0) continue;
      // 1件のみ: そのまま使用
      if (pool.length === 1) { pool[0]._used = true; return pool[0]; }
      // 複数: 名前類似度が最高のものを選択
      let best = pool[0], bestScore = _nameSim(coachTitle, pool[0].opponent);
      for (let i = 1; i < pool.length; i++) {
        const s = _nameSim(coachTitle, pool[i].opponent);
        if (s > bestScore) { bestScore = s; best = pool[i]; }
      }
      best._used = true;
      return best;
    }
    return null;
  }

  const entries = [];
  const usedDiscIds = new Set();

  // ① コーチLINE試合を起点に生成
  const upcomingCoach = coachData
    .filter(c => normDate(c.event_date) >= today)
    .sort((a, b) => {
      const da = normDate(a.event_date), db = normDate(b.event_date);
      if (da !== db) return da.localeCompare(db);
      return catSortKey(a.category_code) - catSortKey(b.category_code);
    });

  for (const cm of upcomingCoach) {
    const key = normDate(cm.event_date) + '_' + catBase(cm.category_code);
    const discs = (discByKey[key] || []).filter(d => !usedDiscIds.has(d.id));

    let disc = discs[0] || null;
    let official = null;

    if (disc) {
      usedDiscIds.add(disc.id);
      const od = safeParse(disc.official_data);
      if (od && (od.opponent || od.time)) official = od;
    } else {
      // 差分なし → 名前類似度マッチで公式エントリを1件ずつ消費（使い回し防止）
      const o = consumeOff(normDate(cm.event_date), cm.category_code, cm.title || cm.league_or_competition);
      if (o) official = { time: o.kickoff_time, opponent: o.opponent, venue: o.venue };
    }

    entries.push({
      date:     normDate(cm.event_date),
      category: cm.category_code,
      coach:    { time: cm.event_time, title: cm.title || cm.league_or_competition, venue: cm.venue },
      official,
      disc,
      status:   disc ? disc.status : 'ok',
    });
  }

  // ② official_only の差分（コーチ側に対応なし）
  for (const d of discData) {
    if (usedDiscIds.has(d.id)) continue;
    if (d.type !== 'official_only') continue;
    const dd = normDate(d.match_date);
    if (dd < today) continue;
    const od = safeParse(d.official_data) || {};
    entries.push({
      date:     dd,
      category: d.category_code,
      coach:    null,
      official: od,
      disc:     d,
      status:   d.status,
    });
    usedDiscIds.add(d.id);
  }

  // ソート: 日付 → カテゴリ
  entries.sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return catSortKey(a.category) - catSortKey(b.category);
  });

  return entries;
}

function renderCatFilter() {
  const merged = buildMerged();
  const cats   = [...new Set(merged.map(e => catBase(e.category)).filter(Boolean))].sort(
    (a, b) => catSortKey(a) - catSortKey(b)
  );
  const bar = document.getElementById('cat-filter');
  bar.innerHTML = ['全て', ...cats].map((c, i) =>
    `<button class="filter-btn ${i===0?'active':''}" onclick="filterCat('${c}',this)">${c}</button>`
  ).join('');
}

function filterCat(c, btn) {
  catFilter = c;
  document.querySelectorAll('#cat-filter .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSchedList();
}

function renderSchedList() {
  const container = document.getElementById('sched-list');
  let entries = buildMerged();

  if (catFilter !== '全て') {
    entries = entries.filter(e => catBase(e.category) === catFilter || e.category === catFilter);
  }

  if (entries.length === 0) {
    container.innerHTML = '<div class="empty">データなし</div>';
    return;
  }

  container.innerHTML = entries.map(e => {
    const c = e.coach   || {};
    const o = e.official || {};

    const lineTime  = c.time  || '—';
    const lineOpp   = c.title ? `vs ${c.title}` : '(なし)';
    const lineVenue = c.venue ? `@ ${c.venue}`  : '';

    const offTime   = o.time     || '—';
    const offOpp    = o.opponent ? `vs ${o.opponent}` : '(なし)';
    const offVenue  = o.venue    ? `@ ${o.venue}` : '';

    const noCoach    = !e.coach;
    const noOfficial = !e.official;

    const actions = (e.disc && e.disc.status === 'open' && isAllowed)
      ? judgeButtons(e.disc.id)
      : '';

    return `<div class="sched-item">
      <div class="sched-head">
        <span class="sched-date-cat">📅 ${fmtDate(e.date)} [${e.category}]</span>
        ${statusBadge(e.status)}
      </div>
      <div class="match-2col">
        <div class="col-line" style="${noCoach ? 'opacity:0.4' : ''}">
          <div class="col-hdr">LINE</div>
          <div class="col-time"     style="color:var(--warn);">${noCoach ? '—' : lineTime}</div>
          <div class="col-opponent" style="color:var(--warn);">${noCoach ? '(なし)' : lineOpp}</div>
          ${!noCoach && lineVenue ? `<div class="col-venue">${lineVenue}</div>` : ''}
        </div>
        <div class="col-sep"></div>
        <div class="col-off" style="${noOfficial ? 'opacity:0.4' : ''}">
          <div class="col-hdr">公式</div>
          <div class="col-time"     style="color:#a0c4ff;">${noOfficial ? '—' : offTime}</div>
          <div class="col-opponent" style="color:#a0c4ff;">${noOfficial ? '(なし)' : offOpp}</div>
          ${!noOfficial && offVenue ? `<div class="col-venue">${offVenue}</div>` : ''}
        </div>
      </div>
      ${actions}
    </div>`;
  }).join('');
}

// ── 判定ボタン ────────────────────────────────────────────────────────────────
function judgeButtons(discId) {
  return `<div class="disc-actions" id="disc-actions-${discId}">
    <button onclick="judgeDisc('${discId}','resolved')" class="judge-btn ok">✅ 確認済</button>
    <button onclick="judgeDisc('${discId}','ng')" class="judge-btn danger">🔍 要調査</button>
  </div>`;
}

async function judgeDisc(id, status) {
  const actions = document.getElementById('disc-actions-' + id);
  if (!actions) return;
  const btns = actions.querySelectorAll('button');
  btns.forEach(b => b.disabled = true);
  setStatus('更新中…');
  try {
    const res = await gasGet('api/discrepancy/judge', { userId, id, status });
    if (res.ok) {
      const d = discData.find(d => d.id === id);
      if (d) d.status = status;
      renderDiscList();
      renderSchedList();
      renderSummary();
      setStatus(status === 'resolved' ? '✅ 確認済として登録' : '🔍 要調査として登録');
    } else {
      setStatus('エラー: ' + JSON.stringify(res));
      btns.forEach(b => b.disabled = false);
    }
  } catch (e) {
    setStatus('エラー: ' + e.message);
    btns.forEach(b => b.disabled = false);
  }
}

// ── 管理操作 ─────────────────────────────────────────────────────────────────
async function adminAction(action) {
  if (!isAdmin) return;
  const result = document.getElementById('admin-result');
  const btns   = document.querySelectorAll('.admin-btn');
  btns.forEach(b => b.disabled = true);
  result.textContent = '実行中…';

  try {
    let res;
    if (action === 'compare') {
      res = await gasGet('api/admin/compare-now', { token: 'regalia-chk-2026' });
      result.textContent = `照合完了: 新規差分 ${res.newDiscrepancies || 0}件`;
      await loadDiscrepancies();
      renderSummary();
      renderSchedList();
    } else if (action === 'send') {
      res = await gasGet('api/admin/send-report-now', { token: 'regalia-chk-2026' });
      result.textContent = res.ok ? 'レポートを配信しました' : 'エラー: ' + JSON.stringify(res);
    } else if (action === 'init') {
      res = await gasGet('api/admin/init-sheets', { token: 'regalia-chk-2026' });
      result.textContent = res.message || (res.ok ? '完了' : 'エラー');
    }
  } catch (e) {
    result.textContent = 'エラー: ' + e.message;
  }

  btns.forEach(b => b.disabled = false);
}

// ── タブ切替 ─────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

// ── 起動 ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
